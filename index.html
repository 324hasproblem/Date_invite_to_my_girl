<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <title>Mart8 Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
body{
  margin:0;
}

#main-container{
  background-image: url("https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/heart-bg.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
}
#envelope-container{
  text-align: center;
  cursor:pointer;

}
@keyframes pulse {
    0% {
        transform:scale(1);
    }
    50% {
        transform: scale(1.1);
    }
    100% {
        transform: scale(1);
    }
}

#envelope{
    width: 200px;
    animation: pulse 1.5s infinite;
    cursor: pointer;
}

#letter-container{
  background:transparent;
    display: none;
    position:fixed;
    inset: 0;
    justify-content: center;
    align-items: center;
}

.letter-window{
    width: 90vw;
    max-width: 800px;
    aspect-ratio: 3/2;
    padding: 20px 20px 0 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background-image: url("https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/window.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    border-radius: 12px;
    gap: 1px;
    padding-top: 180px;

    transform: scale(1.2);
    opacity: 0;
    transition: transform 0.6s ease, opacity 0.6s ease;
}

.letter-window.open {
    transform: scale(1);
    opacity: 1;
}

h1 {
    font-size: 30px;
    margin:30px;
    padding-top:20px;
}

p {
    font-size: 40px;
}

/* Cat */

.cat {
    width: 250px;
    margin: 10px 0;
    transition: width 0.4s ease;
}

.letter-window.final .cat {
    width: 180px;
}

/* buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
    position: relative;
}

.no-wrapper{
    position:relative;
}

.btn {
    width: 120px;
    cursor: pointer;
    user-select: none;
}

.yes-btn,
.no-btn {
width: 120px;
height: auto;
display: inline-block;
}

.yes-btn {
    position: relative;
    z-index: 2;
    transform-origin: center center;
    transition: transform 0.3s ease;
}

.no-btn {
    z-index: 1;
    position: relative;
    transition: transform 0.15s ease;
    cursor: default;
}

.final-text{
    font-size: 22px;
    line-height: 1.4;
    text-align: center;
    display: inline-block;
    padding: 10px 20px;
    background-color: rgba(255,240,240,0.5);
    border-radius: 12px;
}
</style>

   
  </head>
  
  <body>
    <div id="main-container"> 
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/envelope.png" alt="Envelope" id="envelope" />
      <p>♡ Letter for You ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Эмэгтэйчүүдийн эрхийг хамгаалах өдрийн мэнд хайраа<3 Чи надтай өнөөдөр кино болзоо хийх үү?</h1>

        <img src="https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="https://uploads.onecompiler.io/44fq4sbyk/44fq48u6e/no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>Mart8 Date:</strong> Meow Discord at 9pm. Dress fancy! and prepare yummy food
        </p>
      </div>
    </div>
    <script src="script.js"></script>
    </div>
  </body>
</html>
